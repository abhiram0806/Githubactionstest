name: second
on : 
    push:
        branches:
            - main

jobs:
    first:
        runs-on: ubuntu-22.04
        steps:
            - name: firststep
              run: echo 'hi' >> output.txt
            - name: secondstep
              run: echo "bye" >> output.txt
            - name: upload artifacts
              uses: actions/upload-artifact@v3
              with:
                name: first-artifact
                path: output.txt
    second:
        runs-on: ubuntu-22.04
        needs: [first]
        steps:
            - name: download artifacts
              uses: actions/download-artifact@v3
              with:
                name: first-artifact
            - name: print output
              run: |
               cat output.txt
               ls