name: second
on : 
    push:
        branches:
            - main

jobs:
    first:
        runs-on: ubuntu-22.04
        outputs:
            branch:
        steps:
            - name: firststep
              run: echo 'hi' >> output.txt
            - name: secondstep
              run: echo "bye" >> output.txt
            - name: upload artifacts
              uses: actions/upload-artifact@v7
              with:
                name: first-artifact
                path: output.txt
            - name: setting branch name
              run: echo "branch=${GITHUB_REF#refs/heads/}" >> "$GITHUB_OUTPUT"
            - name: seting env
              run: echo 'envvar1= hello' >> "$GITHUB_ENV"
            - name: print env
              run: echo "envvar1 is $envvar1"
    second:
        runs-on: ubuntu-22.04
        needs: [first]
        steps:
            - name: download artifacts
              uses: actions/download-artifact@v7
              with:
                name: first-artifact
            - name: print output
              run: |
               cat output.txt
               ls
            - name: print branch name
              run: echo "Branch is ${{ needs.first.outputs.branch }}"
