name:  first

on: 
  push:
  workflow_dispatch:

jobs:
  first-job:
    runs-on: ubuntu-22.04
    steps:
      - name: firststep
        run: echo 'hi'
      - name: secondstep
        run: echo "bye"
  Deploy:
    runs-on: ubuntu-22.04
    needs: [first-job]
    steps:
      - name: checking code
        uses: actions/checkout@v3
      - name: install node
        uses: actions/setup-node@v3
        with:
          node-version: '19'
      - name: checking npm version
        run: npm -v  
      - name: checking user
        run: whoami
  Githubinfo:
    runs-on: ubuntu-latest
    steps:
      - name: get branch name
        run: echo "##[set-output name=branch;]$(echo ${GITHUB_REF#refs/heads/})"
